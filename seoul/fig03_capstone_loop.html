<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --yonsei: #003876;
    --blue-mid: #1a5296;
    --accent: #005baa;
    --gold: #ffd66b;
    --light: #f4f6f9;
    --slate: #dde3ec;
    --gray: #5a6371;
    --text: #0e1a2f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    color: var(--text);
    width: 1920px; height: 1080px;
    padding: 70px;
    display: grid;
    grid-template-columns: 940px 1fr;
    gap: 60px;
    align-items: stretch;
  }

  /* LOOP — width:height = 940:940 matches SVG viewBox 1:1 */
  .loop {
    position: relative;
    width: 940px; height: 940px;
  }
  .loop svg {
    position: absolute; left: 0; top: 0;
    width: 940px; height: 940px;
    z-index: 1;
  }
  .node {
    position: absolute;
    background: var(--light);
    border: 3px solid var(--slate);
    border-top: 10px solid var(--yonsei);
    border-radius: 18px;
    padding: 24px 22px;
    width: 280px; height: 150px;
    box-shadow: 0 6px 18px rgba(0,56,118,0.10);
    z-index: 2;
    text-align: center;
    display: flex; flex-direction: column; justify-content: center;
  }
  .node .num {
    font-size: 22px; font-weight: 900; letter-spacing: 0.18em;
    color: var(--yonsei); margin-bottom: 8px;
  }
  .node .ttl {
    font-size: 38px; font-weight: 900; color: var(--text);
    line-height: 1.1;
  }

  /* Node positions (around hub center 470, 420) */
  .n1 { top:   0px; left: 330px; }     /* top   center-x = 470 */
  .n2 { top: 220px; left: 660px; }     /* upper-right center = 800, 295 */
  .n3 { top: 590px; left: 540px; }     /* lower-right center = 680, 665 */
  .n4 { top: 590px; left: 120px; }     /* lower-left  center = 260, 665 */
  .n5 { top: 220px; left:   0px; }     /* upper-left  center = 140, 295 */

  .hub {
    position: absolute;
    top: 280px; left: 320px;
    width: 300px; height: 300px;
    background: linear-gradient(135deg, var(--yonsei) 0%, var(--blue-mid) 100%);
    border-radius: 50%;
    box-shadow: 0 12px 36px rgba(0,56,118,0.35);
    display: flex; flex-direction: column; justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 3;
    padding: 22px;
  }
  .hub .top {
    font-size: 22px; color: var(--gold); font-weight: 900;
    letter-spacing: 0.18em; margin-bottom: 14px;
  }
  .hub .big {
    font-size: 44px; color: #fff; font-weight: 900; line-height: 1.15;
  }

  /* RIGHT: 3 pillars */
  .right {
    display: flex; flex-direction: column;
    gap: 32px;
    justify-content: space-between;
  }
  .pillar {
    background: #fff;
    border: 3px solid var(--slate);
    border-left: 10px solid var(--accent);
    border-radius: 18px;
    padding: 32px 36px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    flex: 1;
    display: flex; flex-direction: column; justify-content: center;
  }
  .pillar h3 {
    font-size: 54px; font-weight: 900;
    color: var(--yonsei); margin-bottom: 22px;
    line-height: 1;
  }
  .pillar .stat {
    font-size: 38px; font-weight: 700; color: var(--text);
    line-height: 1.35;
  }
  .pillar .meta {
    font-size: 30px; color: var(--gray);
    margin-top: 14px; line-height: 1.4;
  }
</style>
</head>
<body>
  <!-- Loop -->
  <div class="loop">
    <svg viewBox="0 0 940 940" preserveAspectRatio="none">
      <defs>
        <marker id="arLp" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="7" markerHeight="7" orient="auto">
          <path d="M 0 0 L 12 6 L 0 12 z" fill="#005baa"/>
        </marker>
        <marker id="arIn" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M 0 0 L 12 6 L 0 12 z" fill="#003876"/>
        </marker>
      </defs>

      <!-- Loop arrows: clockwise ① → ② → ③ → ④ → ⑤ → ①.
           Start at outer edge of source box, arc outward, end at edge of target box. -->

      <!-- ① bottom-right (610, 130) → arc → ② top-left (700, 230) -->
      <path d="M 610 140 Q 740 130 720 230"
            stroke="#005baa" stroke-width="6" fill="none" marker-end="url(#arLp)"/>

      <!-- ② bottom (800, 370) → arc out right → ③ top-right (820, 590) -->
      <path d="M 820 380 Q 920 480 820 590"
            stroke="#005baa" stroke-width="6" fill="none" marker-end="url(#arLp)"/>

      <!-- ③ bottom-left (540, 740) → arc down → ④ bottom-right (440, 740) -->
      <path d="M 580 750 Q 470 850 410 750"
            stroke="#005baa" stroke-width="6" fill="none" marker-end="url(#arLp)"/>

      <!-- ④ top-left (140, 600) → arc out left → ⑤ bottom (140, 380) -->
      <path d="M 120 590 Q 20 480 120 380"
            stroke="#005baa" stroke-width="6" fill="none" marker-end="url(#arLp)"/>

      <!-- ⑤ top (140, 230) → arc up → ① bottom-left (340, 130) -->
      <path d="M 220 230 Q 200 130 340 140"
            stroke="#005baa" stroke-width="6" fill="none" marker-end="url(#arLp)"/>

      <!-- Inward dashed arrows pointing to hub circle (center 470,430 radius 150) -->
      <line x1="470" y1="150" x2="470" y2="278"
            stroke="#003876" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arIn)"/>
      <line x1="730" y1="335" x2="588" y2="380"
            stroke="#003876" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arIn)"/>
      <line x1="630" y1="630" x2="585" y2="510"
            stroke="#003876" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arIn)"/>
      <line x1="310" y1="630" x2="355" y2="510"
            stroke="#003876" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arIn)"/>
      <line x1="210" y1="335" x2="352" y2="380"
            stroke="#003876" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arIn)"/>
    </svg>

    <div class="node n1"><div class="num">STEP ①</div><div class="ttl">의제 접수</div></div>
    <div class="node n2"><div class="num">STEP ②</div><div class="ttl">문제 정의</div></div>
    <div class="node n3"><div class="num">STEP ③</div><div class="ttl">실습 · 모델링</div></div>
    <div class="node n4"><div class="num">STEP ④</div><div class="ttl">정책 설계</div></div>
    <div class="node n5"><div class="num">STEP ⑤</div><div class="ttl">성과 환류</div></div>

    <div class="hub">
      <div class="top">FINAL OUTPUT</div>
      <div class="big">시정 AX<br>정책보고서</div>
    </div>
  </div>

  <!-- Right: 3 pillars -->
  <div class="right">
    <div class="pillar">
      <h3>평가지표</h3>
      <div class="stat">출석률 85% · 이수율 95%</div>
      <div class="meta">학생 만족도 4.0+ / 5점</div>
    </div>
    <div class="pillar">
      <h3>관리체계</h3>
      <div class="stat">전자출결 · 통합 LMS</div>
      <div class="meta">8주차 중간점검 · 조기경보</div>
    </div>
    <div class="pillar">
      <h3>사후관리</h3>
      <div class="stat">졸업생 AX 네트워크</div>
      <div class="meta">후속 세미나 · 정책 자문</div>
    </div>
  </div>
</body>
</html>
