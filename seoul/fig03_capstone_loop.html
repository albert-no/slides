<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --yonsei: #003876;
    --blue-mid: #1a5296;
    --accent: #005baa;
    --gold: #ffd66b;
    --light: #f4f6f9;
    --slate: #dde3ec;
    --gray: #5a6371;
    --text: #0e1a2f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    color: var(--text);
    width: 2080px; height: 920px;
    padding: 40px 60px;
    display: grid;
    grid-template-columns: 920px 1fr;
    gap: 80px;
    align-items: center;
  }

  /* LOOP — square area 880x880 */
  .loop {
    position: relative;
    width: 880px; height: 880px;
    margin: 0 auto;
  }

  .node {
    position: absolute;
    background: var(--light);
    border-top: 8px solid var(--yonsei);
    border-radius: 16px;
    padding: 22px 20px;
    width: 280px; height: 140px;
    box-shadow: 0 4px 14px rgba(0,56,118,0.10);
    z-index: 2;
    text-align: center;
    display: flex; flex-direction: column; justify-content: center;
  }
  .node .num {
    font-size: 22px; font-weight: 900; letter-spacing: 0.18em;
    color: var(--yonsei); margin-bottom: 8px;
  }
  .node .ttl {
    font-size: 38px; font-weight: 900; color: var(--text);
    line-height: 1.1;
  }

  /* Node positions arranged in a pentagon around hub center (440, 440).
     Each node 280x140; placed so its center is on the pentagon. */
  .n1 { top:  10px;  left: 300px; }   /* top center */
  .n2 { top: 280px;  left: 600px; }   /* upper right */
  .n3 { top: 660px;  left: 480px; }   /* lower right */
  .n4 { top: 660px;  left: 120px; }   /* lower left */
  .n5 { top: 280px;  left:   0px; }   /* upper left */

  .hub {
    position: absolute;
    top: 290px; left: 290px;
    width: 300px; height: 300px;
    background: linear-gradient(135deg, var(--yonsei) 0%, var(--blue-mid) 100%);
    border-radius: 50%;
    box-shadow: 0 10px 32px rgba(0,56,118,0.30);
    display: flex; flex-direction: column; justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 3;
    padding: 24px;
  }
  .hub .top {
    font-size: 22px; color: var(--gold); font-weight: 900;
    letter-spacing: 0.18em; margin-bottom: 14px;
  }
  .hub .big {
    font-size: 46px; color: #fff; font-weight: 900; line-height: 1.15;
  }

  /* RIGHT: 3 pillars */
  .right {
    display: flex; flex-direction: column;
    gap: 28px;
    justify-content: center;
  }
  .pillar {
    background: var(--light);
    border-left: 10px solid var(--accent);
    border-radius: 14px;
    padding: 28px 34px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .pillar h3 {
    font-size: 50px; font-weight: 900;
    color: var(--yonsei); margin-bottom: 16px;
    line-height: 1;
  }
  .pillar .stat {
    font-size: 36px; font-weight: 700; color: var(--text);
    line-height: 1.3;
  }
  .pillar .meta {
    font-size: 28px; color: var(--gray); font-weight: 500;
    margin-top: 10px; line-height: 1.35;
  }
</style>
</head>
<body>
  <!-- Loop -->
  <div class="loop">
    <div class="node n1"><div class="num">STEP ①</div><div class="ttl">의제 접수</div></div>
    <div class="node n2"><div class="num">STEP ②</div><div class="ttl">문제 정의</div></div>
    <div class="node n3"><div class="num">STEP ③</div><div class="ttl">실습 · 모델링</div></div>
    <div class="node n4"><div class="num">STEP ④</div><div class="ttl">정책 설계</div></div>
    <div class="node n5"><div class="num">STEP ⑤</div><div class="ttl">성과 공유</div></div>

    <div class="hub">
      <div class="top">FINAL OUTPUT</div>
      <div class="big">시정 AX<br>정책보고서</div>
    </div>
  </div>

  <!-- Right: 3 pillars -->
  <div class="right">
    <div class="pillar">
      <h3>평가지표</h3>
      <div class="stat">출석률 85% · 이수율 95%</div>
      <div class="meta">학생 만족도 4.0+ / 5점</div>
    </div>
    <div class="pillar">
      <h3>관리체계</h3>
      <div class="stat">전자출결 · 통합 LMS</div>
      <div class="meta">8주차 중간점검 · 조기경보</div>
    </div>
    <div class="pillar">
      <h3>사후관리</h3>
      <div class="stat">졸업생 AX 네트워크</div>
      <div class="meta">후속 세미나 · 정책 자문</div>
    </div>
  </div>
</body>
</html>
