<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --yonsei: #003876;
    --blue-mid: #1a5296;
    --accent: #005baa;
    --light: #f4f6f9;
    --slate: #dde3ec;
    --gray: #5a6371;
    --text: #0e1a2f;
    --gold: #ffd66b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    color: var(--text);
    width: 1920px; height: 1080px;
    padding: 70px 70px;
    display: flex; flex-direction: column;
  }

  /* TOP: 4-box process row */
  .top-row {
    display: grid;
    grid-template-columns: 1fr 60px 1fr 60px 1.4fr 60px 1fr;
    gap: 12px; align-items: stretch;
  }
  .box {
    background: var(--light);
    border-radius: 22px;
    border-top: 12px solid var(--yonsei);
    padding: 36px 24px 32px;
    text-align: center;
    box-shadow: 0 8px 22px rgba(0,56,118,0.10);
    display: flex; flex-direction: column; justify-content: center;
  }
  .box .num {
    font-size: 26px; font-weight: 900; letter-spacing: 0.18em;
    color: var(--yonsei); margin-bottom: 18px;
  }
  .box .ttl {
    font-size: 56px; font-weight: 900; color: var(--text);
    line-height: 1.1; white-space: nowrap;
  }
  .box.hero {
    background: linear-gradient(135deg, var(--yonsei) 0%, var(--blue-mid) 100%);
    border-top-color: var(--gold);
  }
  .box.hero .num { color: var(--gold); }
  .box.hero .ttl { color: #fff; font-size: 52px; line-height: 1.15; white-space: nowrap; }
  .arrow {
    display: flex; align-items: center; justify-content: center;
    color: var(--yonsei); font-size: 64px; font-weight: 900;
  }

  /* Feeder lines */
  .feeder {
    height: 80px; position: relative;
  }
  .feeder svg { position:absolute; left:0; top:0; width:100%; height:100%; }

  /* BOTTOM: 3 resource pillars (sized to content) */
  .resources {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 36px;
    flex: 1;
    align-items: stretch;
  }
  .pillar {
    background: #fff;
    border: 3px solid var(--slate);
    border-top: 10px solid var(--accent);
    border-radius: 18px;
    padding: 40px 36px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    display: flex; flex-direction: column; justify-content: space-around;
    text-align: center;
  }
  .pillar h3 {
    font-size: 44px; font-weight: 900;
    color: var(--yonsei); margin-bottom: 12px;
    line-height: 1.15;
  }
  .pillar .big-num {
    font-size: 92px; font-weight: 900; color: var(--yonsei);
    line-height: 1; margin: 18px 0 6px;
  }
  .pillar .big-num sup { font-size: 48px; }
  .pillar .stat-lbl {
    font-size: 32px; font-weight: 700; color: var(--text);
    line-height: 1.3;
  }
  .pillar .meta {
    font-size: 26px; color: var(--gray); margin-top: 14px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <!-- Top: 4 process boxes -->
  <div class="top-row">
    <div class="box">
      <div class="num">STEP 1</div>
      <div class="ttl">서울시</div>
    </div>
    <div class="arrow">→</div>
    <div class="box">
      <div class="num">STEP 2</div>
      <div class="ttl">정례 협의체</div>
    </div>
    <div class="arrow">→</div>
    <div class="box hero">
      <div class="num">STEP 3</div>
      <div class="ttl">연세대 교육운영</div>
    </div>
    <div class="arrow">→</div>
    <div class="box">
      <div class="num">STEP 4</div>
      <div class="ttl">성과 환류</div>
    </div>
  </div>

  <!-- Feeder lines: vertical dashed arrows from pillars upward -->
  <div class="feeder">
    <svg viewBox="0 0 1780 80" preserveAspectRatio="none">
      <defs>
        <marker id="arUp" viewBox="0 0 12 12" refX="6" refY="3" markerWidth="10" markerHeight="10" orient="auto">
          <path d="M 0 12 L 6 0 L 12 12 z" fill="#005baa"/>
        </marker>
      </defs>
      <line x1="297"  y1="80" x2="297"  y2="8" stroke="#005baa" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arUp)"/>
      <line x1="890"  y1="80" x2="890"  y2="8" stroke="#005baa" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arUp)"/>
      <line x1="1483" y1="80" x2="1483" y2="8" stroke="#005baa" stroke-width="4" stroke-dasharray="9 7" marker-end="url(#arUp)"/>
    </svg>
  </div>

  <!-- Bottom: 3 pillars -->
  <div class="resources">
    <div class="pillar">
      <h3>AI · 컴퓨팅 교수진</h3>
      <div class="big-num">70<sup>+</sup></div>
      <div class="stat-lbl">강의 가능 교원풀</div>
      <div class="meta">전임 40명+ · 협력 30명+</div>
    </div>
    <div class="pillar">
      <h3>AI 데이터센터</h3>
      <div class="big-num">600<sup>+</sup></div>
      <div class="stat-lbl">GPU 클러스터</div>
      <div class="meta">위탁교육생 무상 제공</div>
    </div>
    <div class="pillar">
      <h3>정책 · 리더십 협력</h3>
      <div class="big-num">4<sup>개</sup></div>
      <div class="stat-lbl">학내 단과대학 협력</div>
      <div class="meta">AI융합 · 공과 · 상남 · 행정</div>
    </div>
  </div>
</body>
</html>
