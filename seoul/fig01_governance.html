<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
  :root {
    --yonsei: #003876;
    --blue-mid: #1a5296;
    --accent: #005baa;
    --light: #f4f6f9;
    --slate: #dde3ec;
    --gray: #5a6371;
    --text: #0e1a2f;
    --gold: #ffd66b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: #fff;
    color: var(--text);
    width: 1920px; height: 1080px;
    padding: 80px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
    align-items: stretch;
  }
  .pillar {
    background: #fff;
    border: 4px solid var(--slate);
    border-top: 16px solid var(--accent);
    border-radius: 24px;
    padding: 70px 50px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    display: flex; flex-direction: column;
    justify-content: space-around;
    text-align: center;
  }
  .pillar h3 {
    font-size: 64px; font-weight: 900;
    color: var(--yonsei); line-height: 1.15;
    margin-bottom: 12px;
  }
  .pillar .big-num {
    font-size: 240px; font-weight: 900; color: var(--yonsei);
    line-height: 1;
  }
  .pillar .big-num sup {
    font-size: 110px;
  }
  .pillar .stat-lbl {
    font-size: 56px; font-weight: 700; color: var(--text);
    line-height: 1.25;
  }
  .pillar .meta {
    font-size: 32px; color: var(--gray);
    line-height: 1.4; font-weight: 500;
  }
</style>
</head>
<body>
  <div class="pillar">
    <h3>AI · 컴퓨팅<br>교수진</h3>
    <div class="big-num">80<sup>+</sup></div>
    <div class="stat-lbl">강의 가능<br>교원풀</div>
    <div class="meta">전임 50명+<br>학내 협력 30명+</div>
  </div>
  <div class="pillar">
    <h3>AI 데이터센터</h3>
    <div class="big-num">600<sup>+</sup></div>
    <div class="stat-lbl">GPU 클러스터</div>
    <div class="meta">위탁교육생<br>무상 제공</div>
  </div>
  <div class="pillar">
    <h3>정책 · 리더십<br>협력</h3>
    <div class="big-num">4<sup>개</sup></div>
    <div class="stat-lbl">학내 다양한<br>조직 협력</div>
    <div class="meta">인공지능융합대학원<br>공과대학&nbsp;·&nbsp;상남경영원<br>행정학과</div>
  </div>
</body>
</html>
